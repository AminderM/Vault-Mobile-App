name: Deploy Web

on:
  push:
    branches: [main, staging, develop]
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'

jobs:
  deploy:
    name: Build & Deploy Web App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 15000
          npm config set fetch-retry-maxtimeout 120000
          npm install --legacy-peer-deps

      - name: Build Web App (Staging)
        if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/staging'
        run: npx expo export --platform web
        timeout-minutes: 10
        env:
          CI: false
          EXPO_ROUTER_DISABLE_RN_NAVIGATION_CHECK: '1'
          EXPO_PUBLIC_API_URL: https://api.staging.integratedtech.ca
          EXPO_PUBLIC_WS_URL: wss://api.staging.integratedtech.ca/loads/stream
          NODE_OPTIONS: --max_old_space_size=4096

      - name: Build Web App (Production)
        if: github.ref == 'refs/heads/main'
        run: npx expo export --platform web
        timeout-minutes: 10
        env:
          CI: false
          EXPO_ROUTER_DISABLE_RN_NAVIGATION_CHECK: '1'
          EXPO_PUBLIC_API_URL: https://api.integratedtech.ca
          EXPO_PUBLIC_WS_URL: wss://api.integratedtech.ca/loads/stream
          NODE_OPTIONS: --max_old_space_size=4096

      - name: Verify build output
        run: |
          if [ ! -f "dist/index.html" ]; then
            echo "❌ Build failed — index.html not found in dist/"
            ls -la dist/ 2>/dev/null || echo "dist/ does not exist"
            exit 1
          fi
          echo "✅ Build verified"
          echo "   Size:  $(du -sh dist/ | cut -f1)"
          echo "   Files: $(find dist/ -type f | wc -l)"

      - name: Create deployment archive
        run: |
          tar -czf dist.tar.gz -C dist .

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.EC2_PORT || 22 }} -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Copy bundle to EC2 (Staging)
        if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/staging'
        run: |
          scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/deploy_key -P ${{ secrets.EC2_PORT || 22 }} dist.tar.gz ${{ secrets.EC2_USER || 'ubuntu' }}@${{ secrets.EC2_HOST }}:/tmp/

      - name: Copy bundle to EC2 (Production)
        if: github.ref == 'refs/heads/main'
        run: |
          scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/deploy_key -P ${{ secrets.EC2_PORT || 22 }} dist.tar.gz ${{ secrets.EC2_USER || 'ubuntu' }}@${{ secrets.EC2_HOST }}:/tmp/

      - name: Deploy and unpack on server (Staging)
        if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/staging'
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/deploy_key -p ${{ secrets.EC2_PORT || 22 }} ${{ secrets.EC2_USER || 'ubuntu' }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e
            echo "🚀 Deploying to Staging..."
            sudo mkdir -p /var/www/vault-app/dist
            sudo rm -rf /var/www/vault-app/dist/*
            sudo tar -xzf /tmp/dist.tar.gz -C /var/www/vault-app/dist
            sudo chown -R ubuntu:ubuntu /var/www/vault-app
            sudo chmod -R 755 /var/www/vault-app
            rm -f /tmp/dist.tar.gz
            echo "✅ Staging deployment complete!"
          EOF

      - name: Deploy and unpack on server (Production)
        if: github.ref == 'refs/heads/main'
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/deploy_key -p ${{ secrets.EC2_PORT || 22 }} ${{ secrets.EC2_USER || 'ubuntu' }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e
            echo "🚀 Deploying to Production..."
            sudo mkdir -p /var/www/vault-app-prod/dist
            sudo rm -rf /var/www/vault-app-prod/dist/*
            sudo tar -xzf /tmp/dist.tar.gz -C /var/www/vault-app-prod/dist
            sudo chown -R ubuntu:ubuntu /var/www/vault-app-prod
            sudo chmod -R 755 /var/www/vault-app-prod
            rm -f /tmp/dist.tar.gz
            echo "✅ Production deployment complete!"
          EOF
